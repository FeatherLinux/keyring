name: Build and Release FeatherLinux Keyring Package
on:
  push:
    branches: [ main ]
  workflow_dispatch:
    
jobs:
  build:
    runs-on: ubuntu-latest
    # Run all steps natively inside the Arch Linux container
    container:
      image: archlinux:latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Initialize Pacman Keys & Update System
        run: |
          pacman-key --init
          pacman-key --populate archlinux
          pacman -Syu --noconfirm

      - name: Install Development Base Tools
        run: |
          pacman -S --needed --noconfirm base-devel sudo git

      - name: Generate Dynamic Version and Inject into PKGBUILD
        run: |
          # 1. Generate date string format: YYYYMMDD
          PKG_DATE=$(date +'%Y%m%d')
          echo "GENERATED_VERSION=$PKG_DATE" >> $GITHUB_ENV
          
          # 2. Dynamically replace pkgver inside your PKGBUILD file
          sed -i "s/^pkgver=.*/pkgver=$PKG_DATE/" PKGBUILD
          
          # 3. Regenerate .SRCINFO to match the new version
          sudo -u builder makepkg --printsrcinfo > .SRCINFO || true

      - name: Configure Non-Root Builder User
        run: |
          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
          chown -R builder:builder "$GITHUB_WORKSPACE"

      - name: Compile Package via makepkg
        run: |
          # makepkg cannot run as root, execute it as the 'builder' user
          sudo -u builder makepkg --syncdeps --noconfirm --log --holdver

      - name: Create Git Tag for Release Tracking
        run: |
          # 1. Force Git to trust any path inside the container environment
          git config --system --add safe.directory '*'
          
          # 2. Configure the automated profile
          git config --system user.name "github-actions[bot]"
          git config --system user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # 3. Explicitly verify Git can see the tree structure now
          git status
          
          # 4. Generate and push the tag
          git tag -a "v${{ env.GENERATED_VERSION }}" -m "Automated build for version ${{ env.GENERATED_VERSION }}"
          git push origin "v${{ env.GENERATED_VERSION }}"

      - name: Upload Raw Package to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ env.GENERATED_VERSION }}"
          files: |
            *.pkg.tar.zst
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
name: Build FeatherLinux Keyring Package
on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    # Run all steps natively inside the Arch Linux container
    container:
      image: archlinux:latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Initialize Pacman Keys & Update System
        run: |
          pacman-key --init
          pacman-key --populate archlinux
          pacman -Syu --noconfirm

      - name: Install Development Base Tools
        run: |
          pacman -S --needed --noconfirm base-devel sudo git

      - name: Configure Non-Root Builder User
        run: |
          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
          chown -R builder:builder "$GITHUB_WORKSPACE"

      - name: Compile Package via makepkg
        run: |
          # makepkg cannot run as root, execute it as the 'builder' user
          sudo -u builder makepkg --syncdeps --noconfirm --log --holdver

      - name: Upload Compiled Package Artifact
        uses: actions/upload-artifact@v4
        with:
          name: arch-packages
          path: |
            *.tar.gz
            *.pkg.tar.zst
            .SRCINFO